version: "3.9"

services:
  database:
    image: postgis/postgis:16-3.4
    container_name: zameentrace-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zameentrace}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: node:20
    container_name: zameentrace-backend
    working_dir: /app
    command: sh -c "npm install && npm --workspace backend run dev"
    environment:
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@database:5432/zameentrace}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-secure-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"
    volumes:
      - ./:/app
    depends_on:
      - database

  frontend:
    image: node:20
    container_name: zameentrace-frontend
    working_dir: /app
    command: sh -c "npm install && npm --workspace frontend run dev"
    environment:
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-ZameenTrace}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api}
      NEXT_PUBLIC_MAP_PROVIDER: ${NEXT_PUBLIC_MAP_PROVIDER:-leaflet}
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    depends_on:
      - backend

volumes:
  postgres_data:
